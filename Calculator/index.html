<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>
    <div class="container">
        <div class="screen">0</div>
        <div class="keys">
            <div class="utilities key" id="delete">C</div>
            <div class="utilities key" id="valor">+/-</div>
            <div class="utilities key" id="percentage">%</div>
            <div class="symbols key" id="divider">÷</div>
            <div class="numbers key" id="seven">7</div>
            <div class="numbers key" id="eight">8</div>
            <div class="numbers key" id="nine">9</div>
            <div class="symbols key" id="multiplier">x</div>
            <div class="numbers key" id="four">4</div>
            <div class="numbers key" id="five">5</div>
            <div class="numbers key" id="six">6</div>
            <div class="symbols key" id="negative">-</div>
            <div class="numbers key" id="one">1</div>
            <div class="numbers key" id="two">2</div>
            <div class="numbers key" id="three">3</div>
            <div class="symbols key" id="plus">+</div>
            <div class="numbers key" id="zero">0</div>
            <div class="numbers key" id="comma">,</div>
            <div class="symbols key" id="equal">=</div>
           
            
            
            
        </div>
    </div>

    
</body>
</html>
